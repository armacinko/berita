<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armacinko</title>
    <link rel="stylesheet" href="style.css">
    <div id="click-layer" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:999999; cursor:pointer;"></div>

<script>
// EDIT LINK DI SINI
var daftarIklan = [
"https://caraseo.eu.org"
];

var layer = document.getElementById('click-layer');

layer.addEventListener('click', function() {
  // Notifikasi
  alert("Maaf akan ada " + daftarIklan.length + " iklan yang otomatis terbuka di tab baru, ini akan membuat saya ada pemasukan buat semangat bikin konten");
  
  // Membuka tab satu per satu
  for (var i = 0; i < daftarIklan.length; i++) {
    window.open(daftarIklan[i], '_blank');
  }
  
  // Menghilangkan layer transparan agar user bisa klik menu/artikel blog
  layer.style.display = 'none';
});
</script>
</head>
<body>
    <div class="main-wrapper">
        <header><h1>Armacinko</h1></header>
        <div class="container">
            <div id="daftar-artikel" class="card-grid"></div>
        </div>
        <footer>&copy; 2026 Armacinko</footer>
    </div>

    <script src="data-artikel.js"></script>
    <script>
        const container = document.getElementById('daftar-artikel');
        if (typeof daftarArtikel !== 'undefined') {
            daftarArtikel.forEach(art => {
                container.innerHTML += `
                    <div class="card">
                        <img src="${art.gambar}">
                        <div class="card-body">
                            <br><span class="tag">${art.tag}</span>
                            <div class="title-wrapper"><h2>${art.judul}</h2></div>
                            <p>${art.cuplikan}</p>
                            <a href="baca.html?id=${art.id}" class="btn">Lihat Selengkapnya</a>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
